# SPDX-License-Identifier: MIT
name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python syntax
        run: python -m compileall -q dashboard benchmarks overlay
      - name: Dashboard weight-load diagnostics
        run: python -m unittest discover -s tests -p 'test_dashboard_weight_load.py' -v
      - name: NVFP4 A4W4 offline integration
        run: |
          python -m unittest discover -s tests \
            -p 'test_deepseek_v4_mixed_quant_dispatch.py' -v
          python -m unittest discover -s tests \
            -p 'test_nvfp4_b12x_clamp.py' -v
          python -m unittest discover -s tests \
            -p 'test_benchmark_nvfp4_a4w4_sm121.py' -v
          python -m unittest discover -s tests \
            -p 'test_build_hybrid_nvfp4_dspark_checkpoint.py' -v
          python -m unittest discover -s tests \
            -p 'test_nvfp4_compose_config.py' -v
      - name: Shell syntax
        run: find scripts dashboard -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Compose NVFP4 backend rendering
        run: |
          for env_file in config/head.env.example config/worker.env.example; do
            rendered="$(docker compose \
              --env-file "$env_file" -f docker-compose.yml config)"
            grep -F -- '--moe-backend flashinfer_b12x' <<<"$rendered"

            overridden="$(DSPARK_MOE_BACKEND=flashinfer_cutlass docker compose \
              --env-file "$env_file" -f docker-compose.yml config)"
            grep -F -- '--moe-backend flashinfer_cutlass' <<<"$overridden"
          done
      - name: Overlay license markers
        run: |
          missing="$(find overlay/vllm -type f -name '*.py' \
            -exec grep -L '^# SPDX-License-Identifier: Apache-2.0' {} +)"
          test -z "$missing" || { printf '%s\n' "$missing"; exit 1; }
      - name: Private-data guard
        run: ./scripts/check-private-data.sh
